name: Build & Push Nginx Image

on:
  push:
    branches: [ "master" ]
    paths:
      - "nginx/**"
      - ".github/workflows/build.yml"
  workflow_dispatch:

env:
  REGISTRY: docker.io
  REPOSITORY: benhari/nginx-lab

  # ✏️ TRAINEES: Set these two values before pushing
  STUDENT_ID: "student-5"   # e.g. student-12
  VERSION: "v1"              # bump this every time you push a new image

jobs:
  build-and-push:   
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: benhari
          password: ${{ secrets.REGISTRY_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./nginx
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.REPOSITORY }}:${{ env.STUDENT_ID }}-${{ env.VERSION }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Print image tag
        run: echo "Pushed ${{ env.REGISTRY }}/${{ env.REPOSITORY }}:${{ env.STUDENT_ID }}-${{ env.VERSION }}"
